<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cal. Eden: Next - Bloom Mode</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 1. メニュー画面 -->
  <div id="gameMenu">
    <h1 id="appTitle">Cal. Eden: Next</h1>
    <p id="subtitle">~ Sharpen your mind with math and English. ~</p>
    <div class="row buttons-2">
      <button class="btn mode-btn" onclick="startBloom()" data-tooltip="英語リスニングと計算力を同時に鍛えるモード">
        🌺 Bloom Mode
      </button>
    </div>

    <div class="series-box">
      <a href="https://furu622.github.io/All.-Eden/" class="back-link">
        ← Back to ALL Eden
      </a>
    </div>
  </div>


  <!-- 2. レベル選択画面 -->
  <div id="levelMenu" style="display:none;">
    <h2 class="section-title">Select Level</h2>
    <p class="level-subtitle">Improve every part of yourself!</p>

    <div class="row buttons-2">
      <button class="btn" onclick="selectLevel('level1')">🍀</button>
      <button class="btn" onclick="selectLevel('level2')">🍀🍀</button>
    </div>
    <div class="row buttons-2">
      <button class="btn" onclick="selectLevel('level3')">🍀🍀🍀</button>
      <button class="btn" onclick="selectLevel('level4')">🍀🍀🍀🍀</button>
    </div>

    <div class="infinity-separator">— Beyond Bloom —</div>

    <div class="row">
      <button class="btn infinity-btn" onclick="showInfinityGroupMenu()">
        🌳☀️ ∞ Laws of the World
      </button>
    </div>

    <div class="row">
      <button class="btn" onclick="goMenu()">Back to Menu</button>
    </div>
  </div>

  <!-- 2a. Level∞ グループ選択 -->
  <div id="infinityGroupMenu" style="display:none;">
    <h2 class="section-title">Select Field</h2>
    <p class="level-subtitle">Keep going. You'll see why.</p>

    <div class="row buttons-2">
      <button class="btn category-btn" onclick="selectInfinityGroup('arithmetic_proportions')">
        📐 Arithmetic & Proportions
      </button>
      <button class="btn category-btn" onclick="selectInfinityGroup('algebra_fundamentals')">
        🧩 Algebra Fundamentals
      </button>
    </div>


    <div class="row buttons-2">
      <button class="btn category-btn" onclick="selectInfinityGroup('forces')">
        💪 Forces & Motion
      </button>
    </div>

    <div class="row buttons-2">
      <button class="btn category-btn" onclick="selectInfinityGroup('electricity')">
        ⚡ Electricity & Fields
      </button>
      <button class="btn category-btn" onclick="selectInfinityGroup('energy')">
        🔥 Energy & Heat
      </button>
    </div>

    <div class="row buttons-1">
      <button class="btn category-btn category-btn--all" onclick="selectInfinityGroup('all')">
        🌍 All Fields
      </button>
    </div>

    <div class="row">
      <button class="btn" onclick="goLevel()">Back to Levels</button>
    </div>
  </div>

  <!-- 2b. Level∞ カテゴリー選択 -->
  <div id="infinityCategoryMenu" style="display:none;">
    <h2 id="categoryMenuTitle" class="section-title">Select Topics</h2>
    <p class="level-subtitle">Keep going. You'll see why.</p>

    <div id="categoryButtonsContainer"></div>

    <div class="row">
      <button class="btn" onclick="showInfinityGroupMenu()">Back to Fields</button>
    </div>
  </div>

  <!-- 3. クイズ画面 -->
  <div id="quiz" style="display:none;">

    <div class="question-row">
      <h2 id="question" class="section-title"></h2>
      <div id="formula"></div>
    </div>

    <input type="number" id="answer" placeholder="Your answer">
    <div id="result"></div>

    <!-- 英文表示切り替え -->
    <div class="row buttons-2">
      <button class="btn" id="toggleQuestionBtn" onclick="toggleQuestion()">
        Show / Hide English
      </button>
    </div>

    <!-- タイマー＋スコア -->
    <div class="timer-wrapper">

      <div class="timer-circle">
        <svg width="120" height="120">
          <circle id="progress" cx="60" cy="60" r="50" stroke="#4caf50" stroke-width="16" fill="none"
            stroke-dasharray="339" stroke-dashoffset="0" transform="rotate(-90 60 60)" />
        </svg>
      </div>

      <div id="sessionInfo">
        Correct / Total:
        <span id="correctCount">0</span>/<span id="totalCount">0</span>
        Time:
        <span id="elapsedTime">0:00</span>
      </div>

    </div>

    <div class="row buttons-2">
      <button class="btn" onclick="goMenu()">Back to Menu</button>
      <button class="btn" onclick="goLevel()">Back to Level</button>
    </div>

  </div>


  <script src="script.js"></script>
  <script src="bloomData.js"></script>
  <!-- Level∞ 問題データファイル（各カテゴリー別） -->
  <!--Arithmetic & Proportions  -->
  <script src="infinityData/Arithmetic_&_Proportions/proportionality.js"></script>
  <script src="infinityData/Arithmetic_&_Proportions/inverse_proportionality.js"></script>
  <script src="infinityData/Arithmetic_&_Proportions/ratios.js"></script>
  <script src="infinityData/Arithmetic_&_Proportions/scaling_laws.js"></script>
  <script src="infinityData/Arithmetic_&_Proportions/unit_conversion.js"></script>
  <!--Algebra Fundamentals  -->
  <script src="infinityData/Algebra_Fundamentals/linear_equations.js"></script>
  <script src="infinityData/Algebra_Fundamentals/solving_for_variables.js"></script>
  <script src="infinityData/Algebra_Fundamentals/systems_of_equations.js"></script>
  <script src="infinityData/Algebra_Fundamentals/rearranging_formulas.js"></script>

  <!--Functions & Graph Sense  -->

  <!--Geometry & Measurement  -->

  <!-- Force & Motion  -->
  <script src="infinityData/Force_&_Motion/mechanics_linear.js"></script>
  <script src="infinityData/Force_&_Motion/statics.js"></script>
  <script src="infinityData/Force_&_Motion/rotational.js"></script>
  <script src="infinityData/Force_&_Motion/machines.js"></script>
  <!-- Electricity & Fiedls  -->
  <script src="infinityData/Electricity_&_Fiedls/electromagnetism.js"></script>
  <script src="infinityData/Electricity_&_Fiedls/circuits.js"></script>
  <!-- Energy & Heat  -->
  <script src="infinityData/Energy_&_Heat/thermodynamics.js"></script>
  <script src="infinityData/Energy_&_Heat/fluidmechanics.js"></script>
  <script src="infinityData/Energy_&_Heat/combustion.js"></script>
  <script src="infinityData/Energy_&_Heat/heattransfer.js"></script>



  <script src="infinityData.js"></script>
  <script src="bloom.js"></script>

  <audio id="bgm" src="assets/eden_bgm_loop.mp3" loop></audio>

</body>

</html>
